name: CI

on:
  workflow_dispatch:

jobs:
  test-prefix:
    name: testing ${{github.ref_name}} as prefix
    if: ${{ startsWith(github.ref_name, 'qwe/') 
            || 1 == 2 }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: hello prefix
        run: echo Hello, prefix!

  test-non-prefix:
    name: testing ${{github.ref_name}} as prefix
    if: ${{ (!startsWith(github.ref_name, 'qwe/'))
            && 1 != 2 }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: hello
        run: echo Hello, something!
